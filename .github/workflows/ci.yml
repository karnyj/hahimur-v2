name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Deploy to Vercel
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        # Build locally and upload only the output, instead of letting
        # Vercel re-install and re-build the whole project remotely.
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_I3UXJkTvJoFEuYoGLTjtzIed
          VERCEL_PROJECT_ID: prj_PGz0hI2855tVFPKGFOiqgf3Hwnh5
