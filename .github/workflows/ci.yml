name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      deploy_sha:
        description: 'Exact commit to build and deploy. Set by the auto-score job to dodge the push-vs-dispatch race where `master` still resolves to the pre-push commit.'
        required: false

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_I3UXJkTvJoFEuYoGLTjtzIed
      VERCEL_PROJECT_ID: prj_PGz0hI2855tVFPKGFOiqgf3Hwnh5
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.deploy_sha || github.sha }}
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      # On deploy runs the build happens inside `vercel build`, so this
      # check is only needed when we're not deploying.
      - run: npm run build
        if: github.event_name == 'pull_request' || github.ref != 'refs/heads/master'
      - name: Deploy to Vercel
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        # Build locally and upload only the output, instead of letting
        # Vercel re-install and re-build the whole project remotely.
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
